<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lunch Rating</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <style>
    :root {
      --pico-font-size: 100%;
      --border-soft: #d1d5db;
    }

    body {
      --pico-block-spacing-vertical: 0.7rem;
    }

    .wrap {
      max-width: 680px;
      margin: 0 auto;
      padding-top: 0.35rem;
      padding-bottom: 0.75rem;
    }

    .seg {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: .4rem;
    }

    .seg5 {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: .4rem;
    }

    form section {
      margin-bottom: .6rem;
    }

    article {
      padding: .7rem .8rem !important;
      margin-bottom: .45rem;
      border-radius: .9rem;
    }

    h3 {
      margin-bottom: .35rem !important;
      font-size: 1rem;
    }

    strong {
      font-size: .98rem;
    }

    input[type="radio"] {
      display: none;
    }

    label.btn {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: .62rem .38rem;
      border: 2px solid var(--border-soft);
      border-radius: .75rem;
      cursor: pointer;
      user-select: none;
      font-weight: 700;
      white-space: nowrap;
      min-height: 40px;
      font-size: .92rem;
      line-height: 1.05;
      transition:
        transform 0.08s ease,
        box-shadow 0.15s ease,
        border-color 0.15s ease,
        filter 0.15s ease;
      position: relative;
      opacity: 0.78;
      filter: saturate(0.9);
    }

    label.btn:active {
      transform: scale(0.97);
    }

    input[type="radio"]:checked + label.btn {
      border-color: #0f172a;
      box-shadow:
        0 0 0 2px rgba(15, 23, 42, 0.12),
        0 4px 10px rgba(15, 23, 42, 0.08);
      transform: translateY(-1px) scale(1.01);
      opacity: 1;
      filter: saturate(1.12);
    }

    .taste-1 { background: #fecaca; color: #7f1d1d; }
    .taste-2 { background: #fed7aa; color: #7c2d12; }
    .taste-3 { background: #fde68a; color: #713f12; }
    .taste-4 { background: #d9f99d; color: #365314; }
    .taste-5 { background: #bbf7d0; color: #14532d; }

    .amt-low  { background: #fecaca; color: #7f1d1d; }
    .amt-ok   { background: #bbf7d0; color: #14532d; }
    .amt-high { background: #fed7aa; color: #7c2d12; }

    nav {
      margin-bottom: .35rem;
    }

    nav strong {
      font-size: 1.1rem;
    }

    nav ul {
      width: 100%;
      display: flex;
      justify-content: center;
      margin: 0;
      padding: 0;
    }

    details {
      margin-top: .1rem;
    }

    details summary {
      cursor: pointer;
      font-weight: 700;
      font-size: .95rem;
      padding: .25rem 0;
    }

    details[open] summary {
      margin-bottom: .35rem;
    }

    textarea {
      min-height: 72px;
      margin-bottom: 0;
      font-size: .95rem;
    }

    .comment-hint {
      font-size: .82rem;
      opacity: .72;
      margin-top: .1rem;
    }

    #submitBtn {
      margin-top: .25rem;
      margin-bottom: 0;
      min-height: 42px;
      font-weight: 700;
    }

    @media (max-width: 430px) {
      :root {
        --pico-font-size: 96%;
      }

      .wrap {
        padding-top: 0.2rem;
        padding-bottom: 0.5rem;
      }

      .seg {
        gap: .35rem;
      }

      .seg5 {
        gap: .35rem;
      }

      article {
        padding: .62rem .68rem !important;
        margin-bottom: .38rem;
      }

      label.btn {
        padding: .56rem .25rem;
        min-height: 38px;
        font-size: .84rem;
      }

      nav strong {
        font-size: 1.02rem;
      }

      h3 {
        font-size: .96rem;
      }

      strong {
        font-size: .92rem;
      }

      textarea {
        min-height: 64px;
      }
    }
  </style>
</head>
<body>
<main class="container wrap">
  <nav>
    <ul>
      <li><strong>Lunch Rating</strong></li>
    </ul>
  </nav>

  <form id="ratingForm">
    <section>
      <h3>How was the food?</h3>
      <div class="seg5">
        <div>
          <input id="t1" name="taste" type="radio" value="1" required>
          <label class="btn taste-1" for="t1">1</label>
        </div>
        <div>
          <input id="t2" name="taste" type="radio" value="2">
          <label class="btn taste-2" for="t2">2</label>
        </div>
        <div>
          <input id="t3" name="taste" type="radio" value="3">
          <label class="btn taste-3" for="t3">3</label>
        </div>
        <div>
          <input id="t4" name="taste" type="radio" value="4">
          <label class="btn taste-4" for="t4">4</label>
        </div>
        <div>
          <input id="t5" name="taste" type="radio" value="5">
          <label class="btn taste-5" for="t5">5</label>
        </div>
      </div>
    </section>

    <section>
      <h3>How were the portions?</h3>

      <article>
        <strong>🍗 Protein</strong>
        <div class="seg" style="margin-top:.4rem;">
          <div>
            <input id="p_low" name="proteinAmount" type="radio" value="More please">
            <label class="btn amt-low" for="p_low">More please</label>
          </div>
          <div>
            <input id="p_ok" name="proteinAmount" type="radio" value="Perfect" checked>
            <label class="btn amt-ok" for="p_ok">Perfect</label>
          </div>
          <div>
            <input id="p_high" name="proteinAmount" type="radio" value="Too much">
            <label class="btn amt-high" for="p_high">Too much</label>
          </div>
        </div>
      </article>

      <article>
        <strong>🍚 Carbs</strong>
        <div class="seg" style="margin-top:.4rem;">
          <div>
            <input id="c_low" name="carbAmount" type="radio" value="More please">
            <label class="btn amt-low" for="c_low">More please</label>
          </div>
          <div>
            <input id="c_ok" name="carbAmount" type="radio" value="Perfect" checked>
            <label class="btn amt-ok" for="c_ok">Perfect</label>
          </div>
          <div>
            <input id="c_high" name="carbAmount" type="radio" value="Too much">
            <label class="btn amt-high" for="c_high">Too much</label>
          </div>
        </div>
      </article>

      <article>
        <strong>🥗 Salad</strong>
        <div class="seg" style="margin-top:.4rem;">
          <div>
            <input id="s_low" name="saladAmount" type="radio" value="More please">
            <label class="btn amt-low" for="s_low">More please</label>
          </div>
          <div>
            <input id="s_ok" name="saladAmount" type="radio" value="Perfect" checked>
            <label class="btn amt-ok" for="s_ok">Perfect</label>
          </div>
          <div>
            <input id="s_high" name="saladAmount" type="radio" value="Too much">
            <label class="btn amt-high" for="s_high">Too much</label>
          </div>
        </div>
      </article>
    </section>

    <section>
      <details>
        <summary>Got tea? Add a comment ☕</summary>
        <div class="comment-hint">Optional. Praise, complaints, chaos, or constructive feedback.</div>
        <label style="margin-top:.35rem;">
          <textarea name="comment" rows="2" placeholder="For example: chicken great, salad tragic"></textarea>
        </label>
      </details>
    </section>

    <button id="submitBtn" type="submit">Submit</button>
  </form>
</main>

<script src="app.js"></script>
<script>
  if (!redirectIfAlreadySubmitted("rating")) {
    document.getElementById("ratingForm").addEventListener("submit", async (ev) => {
      ev.preventDefault();

      const submitBtn = document.getElementById("submitBtn");
      setSubmitting(submitBtn, true);

      const fd = new FormData(ev.target);
      const payload = {
        type: "rating",
        taste: fd.get("taste"),
        proteinAmount: fd.get("proteinAmount"),
        carbAmount: fd.get("carbAmount"),
        saladAmount: fd.get("saladAmount"),
        comment: fd.get("comment") || ""
      };

      try {
        await postNoCors(payload);
        markSubmitted("rating");
        goToThankYou("rating");
      } catch (e) {
        setSubmitting(submitBtn, false);
        alert("Could not submit. Please try again.");
      }
    });
  }
</script>
</body>
</html>
