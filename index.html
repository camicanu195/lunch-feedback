<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lunch Rating</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <style>
    :root {
      --pico-font-size: 106%;
      --border-soft: #d1d5db;
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
    }

    .seg {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: .5rem;
    }

    .seg5 {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: .5rem;
    }

    input[type="radio"] {
      display: none;
    }

    label.btn {
      display: block;
      text-align: center;
      padding: .85rem .6rem;
      border: 2px solid var(--border-soft);
      border-radius: .8rem;
      cursor: pointer;
      user-select: none;
      font-weight: 700;
      transition:
        transform 0.08s ease,
        box-shadow 0.15s ease,
        border-color 0.15s ease,
        filter 0.15s ease;
      position: relative;
      opacity: 0.78;
      filter: saturate(0.9);
    }

    label.btn:active {
      transform: scale(0.97);
    }

    input[type="radio"]:checked + label.btn {
      border-color: #0f172a;
      box-shadow:
        0 0 0 3px rgba(15, 23, 42, 0.14),
        0 6px 14px rgba(15, 23, 42, 0.10);
      transform: translateY(-1px) scale(1.02);
      opacity: 1;
      filter: saturate(1.15);
    }

    input[type="radio"]:checked + label.btn::after {
      content: "✓";
      position: absolute;
      top: 8px;
      right: 10px;
      font-size: 0.9rem;
      font-weight: 900;
      line-height: 1;
    }

    .taste-1 { background: #fecaca; color: #7f1d1d; }
    .taste-2 { background: #fed7aa; color: #7c2d12; }
    .taste-3 { background: #fde68a; color: #713f12; }
    .taste-4 { background: #d9f99d; color: #365314; }
    .taste-5 { background: #bbf7d0; color: #14532d; }

    .amt-low  { background: #fecaca; color: #7f1d1d; }
    .amt-ok   { background: #bbf7d0; color: #14532d; }
    .amt-high { background: #fed7aa; color: #7c2d12; }

    details summary {
      cursor: pointer;
    }
  </style>
</head>
<body>
<main class="container wrap">
  <nav>
    <ul><li><strong>Lunch Rating</strong></li></ul>
    <ul><li><a href="leftovers.html">Leftovers</a></li></ul>
  </nav>

  <p id="todayLabel" class="secondary"></p>

  <form id="ratingForm">
    <section>
      <h3 style="margin-bottom:.5rem;">Taste</h3>
      <div class="seg5">
        <div>
          <input id="t1" name="taste" type="radio" value="1" required>
          <label class="btn taste-1" for="t1">1</label>
        </div>
        <div>
          <input id="t2" name="taste" type="radio" value="2">
          <label class="btn taste-2" for="t2">2</label>
        </div>
        <div>
          <input id="t3" name="taste" type="radio" value="3">
          <label class="btn taste-3" for="t3">3</label>
        </div>
        <div>
          <input id="t4" name="taste" type="radio" value="4">
          <label class="btn taste-4" for="t4">4</label>
        </div>
        <div>
          <input id="t5" name="taste" type="radio" value="5">
          <label class="btn taste-5" for="t5">5</label>
        </div>
      </div>
    </section>

    <section>
      <h3 style="margin-bottom:.5rem;">Amounts</h3>

      <article style="padding:1rem;">
        <strong>Protein</strong>
        <div class="seg" style="margin-top:.5rem;">
          <div>
            <input id="p_low" name="proteinAmount" type="radio" value="Too little">
            <label class="btn amt-low" for="p_low">Too little</label>
          </div>
          <div>
            <input id="p_ok" name="proteinAmount" type="radio" value="Enough" checked>
            <label class="btn amt-ok" for="p_ok">Enough</label>
          </div>
          <div>
            <input id="p_high" name="proteinAmount" type="radio" value="Too much">
            <label class="btn amt-high" for="p_high">Too much</label>
          </div>
        </div>
      </article>

      <article style="padding:1rem;">
        <strong>Carbs</strong>
        <div class="seg" style="margin-top:.5rem;">
          <div>
            <input id="c_low" name="carbAmount" type="radio" value="Too little">
            <label class="btn amt-low" for="c_low">Too little</label>
          </div>
          <div>
            <input id="c_ok" name="carbAmount" type="radio" value="Enough" checked>
            <label class="btn amt-ok" for="c_ok">Enough</label>
          </div>
          <div>
            <input id="c_high" name="carbAmount" type="radio" value="Too much">
            <label class="btn amt-high" for="c_high">Too much</label>
          </div>
        </div>
      </article>

      <article style="padding:1rem;">
        <strong>Salad</strong>
        <div class="seg" style="margin-top:.5rem;">
          <div>
            <input id="s_low" name="saladAmount" type="radio" value="Too little">
            <label class="btn amt-low" for="s_low">Too little</label>
          </div>
          <div>
            <input id="s_ok" name="saladAmount" type="radio" value="Enough" checked>
            <label class="btn amt-ok" for="s_ok">Enough</label>
          </div>
          <div>
            <input id="s_high" name="saladAmount" type="radio" value="Too much">
            <label class="btn amt-high" for="s_high">Too much</label>
          </div>
        </div>
      </article>
    </section>

    <section>
      <details>
        <summary>Add comment (optional)</summary>
        <label>
          <textarea name="comment" rows="3" placeholder="Quick note..."></textarea>
        </label>
      </details>
    </section>

    <button id="submitBtn" type="submit">Submit</button>
  </form>

  <small class="secondary">Most people can just tap Taste + Submit unless something was off.</small>
</main>

<script src="app.js"></script>
<script>
  setTodayLabel();

  if (!redirectIfAlreadySubmitted("rating")) {
    document.getElementById("ratingForm").addEventListener("submit", async (ev) => {
      ev.preventDefault();

      const submitBtn = document.getElementById("submitBtn");
      setSubmitting(submitBtn, true);

      const fd = new FormData(ev.target);
      const payload = {
        type: "rating",
        taste: fd.get("taste"),
        proteinAmount: fd.get("proteinAmount"),
        carbAmount: fd.get("carbAmount"),
        saladAmount: fd.get("saladAmount"),
        comment: fd.get("comment") || ""
      };

      try {
        await postNoCors(payload);
        markSubmitted("rating");
        goToThankYou("rating");
      } catch (e) {
        setSubmitting(submitBtn, false);
        alert("Could not submit. Please try again.");
      }
    });
  }
</script>
</body>
</html>
