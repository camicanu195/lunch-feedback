<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lunch Check</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="apple-touch-icon" href="icon.png">
  <meta name="apple-mobile-web-app-title" content="Lunch Check">
  <meta name="apple-mobile-web-app-capable" content="yes">
  
  <style>
    :root {
      --pico-font-size: 100%;
      --border-soft: #d1d5db;
    }

    body {
      --pico-block-spacing-vertical: 0.7rem;
    }

    .wrap {
      max-width: 680px;
      margin: 0 auto;
      padding-top: 0.35rem;
      padding-bottom: 0.75rem;
    }

    .seg {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: .4rem;
    }

    .seg4 {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: .4rem;
    }

    .seg2 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: .4rem;
    }

    form section {
      margin-bottom: .6rem;
    }

    article {
      padding: .7rem .8rem !important;
      margin-bottom: .45rem;
      border-radius: .9rem;
    }

    h3 {
      margin-bottom: .35rem !important;
      font-size: 1rem;
    }

    strong {
      font-size: .98rem;
    }

    input[type="radio"] {
      display: none;
    }

    label.btn {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: .8rem .45rem;
      border: 2px solid var(--border-soft);
      border-radius: .9rem;
      cursor: pointer;
      user-select: none;
      font-weight: 700;
      min-height: 56px;
      font-size: 1rem;
      line-height: 1.05;
      transition:
        transform 0.08s ease,
        box-shadow 0.15s ease,
        border-color 0.15s ease,
        filter 0.15s ease;
      position: relative;
      opacity: 0.78;
      filter: saturate(0.9);
    }

    label.btn:active {
      transform: scale(0.97);
    }

    input[type="radio"]:checked + label.btn {
      border-color: #0f172a;
      box-shadow:
        0 0 0 2px rgba(15, 23, 42, 0.12),
        0 4px 10px rgba(15, 23, 42, 0.08);
      transform: translateY(-1px) scale(1.01);
      opacity: 1;
      filter: saturate(1.12);
    }

    @media (prefers-color-scheme: dark) {
      input[type="radio"]:checked + label.btn {
        border-color: rgba(255, 255, 255, 0.92);
        box-shadow:
          0 0 0 3px rgba(255, 255, 255, 0.28),
          0 0 0 6px rgba(255, 255, 255, 0.10),
          0 8px 18px rgba(0, 0, 0, 0.38);
        transform: translateY(-1px) scale(1.02);
        opacity: 1;
        filter: saturate(1.18) brightness(1.12);
      }

      label.btn {
        opacity: 0.88;
      }
    }

    input[type="radio"]:checked + label.btn::before {
      content: "";
      position: absolute;
      top: 7px;
      right: 7px;
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: currentColor;
      opacity: 0.85;
    }

    @media (prefers-color-scheme: dark) {
      input[type="radio"]:checked + label.btn::before {
        background: rgba(100, 100, 100, 0.95);
        opacity: 1;
      }
    }

    .amt-low  { background:#ffe8cc; color:#9a3412; }
    .amt-ok   { background:#d3f9d8; color:#2b8a3e; }
    .amt-high { background:#fff3bf; color:#854d0e; }

    .yes-btn  { background:#d3f9d8; color:#2b8a3e; }
    .no-btn   { background:#ffe8cc; color:#9a3412; }

    .seg4 label.btn {
      background: var(--pico-card-background-color);
      color: inherit;
      font-size: 2rem;
      line-height: 1;
      min-height: 72px;
      padding: .9rem .2rem;
      border-radius: 1rem;
    }

    nav {
      margin-bottom: .35rem;
    }

    nav strong {
      font-size: 1.1rem;
    }

    nav ul {
      width: 100%;
      display: flex;
      justify-content: center;
      margin: 0;
      padding: 0;
    }

    details {
      margin-top: .1rem;
    }

    details summary {
      cursor: pointer;
      font-weight: 700;
      font-size: .95rem;
      padding: .25rem 0;
    }

    details[open] summary {
      margin-bottom: .35rem;
    }

    textarea {
      min-height: 72px;
      margin-bottom: 0;
      font-size: .95rem;
    }

    .comment-hint {
      font-size: .82rem;
      opacity: .72;
      margin-top: .1rem;
    }

    #portionBreakdown.hidden {
      display: none;
    }

    #submitBtn {
      margin-top: .25rem;
      margin-bottom: 0;
      min-height: 42px;
      font-weight: 700;
    }

    @media (max-width: 430px) {
      :root {
        --pico-font-size: 96%;
      }

      .wrap {
        padding-top: 0.2rem;
        padding-bottom: 0.5rem;
      }

      .seg, .seg4, .seg2 {
        gap: .35rem;
      }

      article {
        padding: .62rem .68rem !important;
        margin-bottom: .38rem;
      }
      .seg4 label.btn {
        font-size: 1.75rem;
        min-height: 64px;
        padding: .8rem .2rem;
      }

      label.btn {
        padding: .7rem .3rem;
        min-height: 50px;
        font-size: .9rem;
      }

      nav strong {
        font-size: 1.02rem;
      }

      h3 {
        font-size: .96rem;
      }

      strong {
        font-size: .92rem;
      }

      textarea {
        min-height: 64px;
      }
    }
  </style>
</head>
<body>
<main class="container wrap">
  <nav>
    <ul>
      <li><strong>Lunch Check</strong></li>
    </ul>
  </nav>

  <form id="ratingForm">
    <section>
      <h3>How was the food?</h3>
      <div class="seg4">
        <div>
          <input id="t1" name="taste" type="radio" value="1" required>
          <label class="btn" for="t1">🤮</label>
        </div>
        <div>
          <input id="t2" name="taste" type="radio" value="2">
          <label class="btn" for="t2">😕</label>
        </div>
        <div>
          <input id="t3" name="taste" type="radio" value="3">
          <label class="btn" for="t3">🙂</label>
        </div>
        <div>
          <input id="t4" name="taste" type="radio" value="4">
          <label class="btn" for="t4">😋</label>
        </div>
      </div>
    </section>

    <section>
      <h3>Were portions adequate?</h3>
      <div class="seg2">
        <div>
          <input id="portion_yes" name="portionAdequate" type="radio" value="Yes" checked>
          <label class="btn yes-btn" for="portion_yes">Yes</label>
        </div>
        <div>
          <input id="portion_no" name="portionAdequate" type="radio" value="No">
          <label class="btn no-btn" for="portion_no">No</label>
        </div>
      </div>

      <div id="portionBreakdown" class="hidden" style="margin-top:.55rem;">
        <article>
          <strong>🍗 Protein</strong>
          <div class="seg" style="margin-top:.4rem;">
            <div>
              <input id="p_low" name="proteinAmount" type="radio" value="More please">
              <label class="btn amt-low" for="p_low">More please</label>
            </div>
            <div>
              <input id="p_ok" name="proteinAmount" type="radio" value="Perfect" checked>
              <label class="btn amt-ok" for="p_ok">Perfect</label>
            </div>
            <div>
              <input id="p_high" name="proteinAmount" type="radio" value="Too much">
              <label class="btn amt-high" for="p_high">Too much</label>
            </div>
          </div>
        </article>

        <article>
          <strong>🍚 Carbs</strong>
          <div class="seg" style="margin-top:.4rem;">
            <div>
              <input id="c_low" name="carbAmount" type="radio" value="More please">
              <label class="btn amt-low" for="c_low">More please</label>
            </div>
            <div>
              <input id="c_ok" name="carbAmount" type="radio" value="Perfect" checked>
              <label class="btn amt-ok" for="c_ok">Perfect</label>
            </div>
            <div>
              <input id="c_high" name="carbAmount" type="radio" value="Too much">
              <label class="btn amt-high" for="c_high">Too much</label>
            </div>
          </div>
        </article>

        <article>
          <strong>🥗 Salad</strong>
          <div class="seg" style="margin-top:.4rem;">
            <div>
              <input id="s_low" name="saladAmount" type="radio" value="More please">
              <label class="btn amt-low" for="s_low">More please</label>
            </div>
            <div>
              <input id="s_ok" name="saladAmount" type="radio" value="Perfect" checked>
              <label class="btn amt-ok" for="s_ok">Perfect</label>
            </div>
            <div>
              <input id="s_high" name="saladAmount" type="radio" value="Too much">
              <label class="btn amt-high" for="s_high">Too much</label>
            </div>
          </div>
        </article>
      </div>
    </section>

    <section>
      <details>
        <summary>Got tea? Add a comment ☕</summary>
        <div class="comment-hint">Optional. Praise, complaints, chaos, or constructive feedback.</div>
        <label style="margin-top:.35rem;">
          <textarea name="comment" rows="2" placeholder="For example: chicken great, salad tragic"></textarea>
        </label>
      </details>
    </section>

    <button id="submitBtn" type="submit">Done</button>
  </form>
</main>

<script src="app.js"></script>
<script>
  const portionYes = document.getElementById("portion_yes");
  const portionNo = document.getElementById("portion_no");
  const portionBreakdown = document.getElementById("portionBreakdown");

  function togglePortionBreakdown() {
    portionBreakdown.classList.toggle("hidden", !portionNo.checked);
  }

  portionYes.addEventListener("change", togglePortionBreakdown);
  portionNo.addEventListener("change", togglePortionBreakdown);
  togglePortionBreakdown();

  if (!redirectIfAlreadySubmitted("rating")) {
    document.getElementById("ratingForm").addEventListener("submit", async (ev) => {
      ev.preventDefault();

      const submitBtn = document.getElementById("submitBtn");
      setSubmitting(submitBtn, true, "Done");

      const fd = new FormData(ev.target);
      const portionAdequate = fd.get("portionAdequate");

      const payload = {
        type: "rating",
        taste: fd.get("taste"),
        portionAdequate: portionAdequate,
        proteinAmount: portionAdequate === "No" ? fd.get("proteinAmount") : "Perfect",
        carbAmount: portionAdequate === "No" ? fd.get("carbAmount") : "Perfect",
        saladAmount: portionAdequate === "No" ? fd.get("saladAmount") : "Perfect",
        comment: fd.get("comment") || ""
      };

      try {
        await postNoCors(payload);
        markSubmitted("rating");
        goToThankYou("rating");
      } catch (e) {
        setSubmitting(submitBtn, false, "Done");
        alert("Could not submit. Please try again.");
      }
    });
  }
</script>
</body>
</html>
