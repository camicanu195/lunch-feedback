<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Leftovers</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <style>
    :root {
      --pico-font-size: 106%;
      --none-green: #dcfce7;
      --little-yellow: #fef9c3;
      --lot-red: #fee2e2;
      --border-soft: #d1d5db;
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
    }

    .seg {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: .5rem;
    }

    input[type="radio"] {
      display: none;
    }

    label.btn {
      display: block;
      text-align: center;
      padding: .8rem .55rem;
      border: 1px solid var(--border-soft);
      border-radius: .75rem;
      cursor: pointer;
      user-select: none;
      font-weight: 600;
      transition: transform 0.06s ease, box-shadow 0.12s ease, border-color 0.12s ease;
    }

    label.btn:active {
      transform: scale(0.98);
    }

    input[type="radio"]:checked + label.btn {
      box-shadow: 0 0 0 3px rgba(15, 23, 42, 0.08);
      border-color: rgba(15, 23, 42, 0.28);
    }

    .left-none   { background: #dcfce7; color: #166534; }
    .left-little { background: #fef9c3; color: #854d0e; }
    .left-lot    { background: #fee2e2; color: #991b1b; }

    .submitted-banner {
      margin-bottom: 1rem;
      padding: 0.9rem 1rem;
      border: 1px solid #16a34a;
      border-radius: 0.75rem;
      background: #f0fdf4;
      color: #166534;
      font-weight: 600;
    }

    .reset-wrap {
      margin-top: .5rem;
    }

    .reset-btn {
      margin-top: .5rem;
    }

    details summary {
      cursor: pointer;
    }

    #toast {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 16px;
      padding: .75rem 1rem;
      border-radius: .75rem;
      background: var(--pico-card-background-color);
      border: 1px solid var(--border-soft);
      box-shadow: var(--pico-box-shadow);
      font-weight: 600;
    }
  </style>
</head>
<body>
<main class="container wrap">
  <nav>
    <ul><li><strong>Leftovers</strong></li></ul>
    <ul><li><a href="index.html">Rating</a></li></ul>
  </nav>

  <p id="todayLabel" class="secondary"></p>

  <div id="alreadySubmittedBanner" class="submitted-banner" hidden>
    You already submitted today's leftovers on this device.
    <details class="reset-wrap">
      <summary>Need to resubmit?</summary>
      <button type="button" id="resetSubmissionBtn" class="secondary reset-btn">Allow resubmission on this device</button>
    </details>
  </div>

  <form id="leftForm">
    <section>
      <h3 style="margin-bottom:.5rem;">Leftovers</h3>

      <article style="padding:1rem;">
        <strong>Protein</strong>
        <div class="seg" style="margin-top:.5rem;">
          <div>
            <input id="pl_none" name="proteinLeftovers" type="radio" value="None" checked>
            <label class="btn left-none" for="pl_none">None</label>
          </div>
          <div>
            <input id="pl_some" name="proteinLeftovers" type="radio" value="A little">
            <label class="btn left-little" for="pl_some">A little</label>
          </div>
          <div>
            <input id="pl_lot" name="proteinLeftovers" type="radio" value="A lot">
            <label class="btn left-lot" for="pl_lot">A lot</label>
          </div>
        </div>
      </article>

      <article style="padding:1rem;">
        <strong>Carbs</strong>
        <div class="seg" style="margin-top:.5rem;">
          <div>
            <input id="cl_none" name="carbLeftovers" type="radio" value="None" checked>
            <label class="btn left-none" for="cl_none">None</label>
          </div>
          <div>
            <input id="cl_some" name="carbLeftovers" type="radio" value="A little">
            <label class="btn left-little" for="cl_some">A little</label>
          </div>
          <div>
            <input id="cl_lot" name="carbLeftovers" type="radio" value="A lot">
            <label class="btn left-lot" for="cl_lot">A lot</label>
          </div>
        </div>
      </article>

      <article style="padding:1rem;">
        <strong>Salad</strong>
        <div class="seg" style="margin-top:.5rem;">
          <div>
            <input id="sl_none" name="saladLeftovers" type="radio" value="None" checked>
            <label class="btn left-none" for="sl_none">None</label>
          </div>
          <div>
            <input id="sl_some" name="saladLeftovers" type="radio" value="A little">
            <label class="btn left-little" for="sl_some">A little</label>
          </div>
          <div>
            <input id="sl_lot" name="saladLeftovers" type="radio" value="A lot">
            <label class="btn left-lot" for="sl_lot">A lot</label>
          </div>
        </div>
      </article>
    </section>

    <section>
      <details>
        <summary>Add notes (optional)</summary>
        <label>
          <textarea name="notes" rows="3" placeholder="Anything notable?"></textarea>
        </label>
      </details>
    </section>

    <button id="submitBtn" type="submit">Submit</button>
  </form>
</main>

<div id="toast" hidden></div>

<script src="app.js"></script>
<script>
  setTodayLabel();
  lockPageIfSubmitted("leftovers", "leftForm", "alreadySubmittedBanner");

  document.getElementById("resetSubmissionBtn").addEventListener("click", () => {
    unlockPage("leftovers", "leftForm", "alreadySubmittedBanner");
    toast("Resubmission enabled", true);
  });

  document.getElementById("leftForm").addEventListener("submit", async (ev) => {
    ev.preventDefault();

    if (alreadySubmitted("leftovers")) {
      toast("Already submitted today", false);
      lockPageIfSubmitted("leftovers", "leftForm", "alreadySubmittedBanner");
      return;
    }

    const submitBtn = document.getElementById("submitBtn");
    setSubmitting(submitBtn, true);

    const fd = new FormData(ev.target);
    const payload = {
      type: "leftovers",
      proteinLeftovers: fd.get("proteinLeftovers"),
      carbLeftovers: fd.get("carbLeftovers"),
      saladLeftovers: fd.get("saladLeftovers"),
      notes: fd.get("notes") || ""
    };

    try {
      await postNoCors(payload);
      markSubmitted("leftovers");
      toast("Saved ✅", true);
      lockPageIfSubmitted("leftovers", "leftForm", "alreadySubmittedBanner");
    } catch (e) {
      toast("Could not submit", false);
      setSubmitting(submitBtn, false);
    }
  });
</script>
</body>
</html>
